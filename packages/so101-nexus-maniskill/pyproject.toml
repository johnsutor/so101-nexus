[project]
name = "so101-nexus-maniskill"
version = "0.2.0"
description = "ManiSkill simulation environments for the SO-101 robot arm"
requires-python = ">=3.12"
dependencies = ["so101-nexus-core==0.2.0", "mani_skill", "setuptools<82"]
license = "Apache-2.0"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [{ include-group = "test" }]
test = ["pytest>=7.0.0", "pytest-cov>=7.0.0"]

[tool.uv.sources]
so101-nexus-core = { workspace = true }
