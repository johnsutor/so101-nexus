[project]
name = "so101-nexus-maniskill"
version = "0.1.0"
description = "ManiSkill simulation environments for the SO-101 robot arm"
readme = "../../README.md"
requires-python = ">=3.10"
dependencies = ["so101-nexus-core", "mani_skill", "setuptools<82"]
license = "Apache-2.0"

[dependency-groups]
dev = [{ include-group = "test" }]
test = ["pytest>=7.0.0", "pytest-cov>=7.0.0"]

[tool.uv.sources]
so101-nexus-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/so101_nexus_maniskill"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
