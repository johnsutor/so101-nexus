[project]
name = "so101-nexus-mujoco"
version = "0.2.0"
description = "MuJoCo simulation environments for the SO-101 robot arm"
requires-python = ">=3.10"
dependencies = ["so101-nexus-core==0.2.0", "mujoco>=3.0.0", "gymnasium>=1.0.0"]
license = "Apache-2.0"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [{ include-group = "test" }]
test = ["pytest>=7.0.0", "pytest-cov>=7.0.0"]
teleop = ["lerobot[feetech]>=0.4.0", "gradio>=5.0.0", "plotly>=6.0.0"]

[tool.uv.sources]
so101-nexus-core = { workspace = true }
