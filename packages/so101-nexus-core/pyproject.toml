[project]
name = "so101-nexus-core"
version = "0.3.4"
description = "Shared assets and types for SO101-Nexus simulation environments"
requires-python = ">=3.12"
dependencies = ["numpy", "huggingface_hub", "trimesh", "scipy"]
license = "Apache-2.0"
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: Apache Software License",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3 :: Only",
    "Operating System :: OS Independent",
    "Typing :: Typed",
]

[project.optional-dependencies]
viz = ["Pillow"]
teleop = [
    "lerobot[feetech]>=0.5.0",
    "gradio>=5.0.0",
    "plotly>=6.0.0",
    "opencv-python>=4.8.0",
    "Pillow",
]

[tool.hatch.build.targets.wheel]
packages = ["src/so101_nexus_core"]
exclude = ["src/so101_nexus_core/assets/**/*"]

[tool.hatch.build.targets.wheel.force-include]
"src/so101_nexus_core/assets/SO101" = "so101_nexus_core/assets/SO101"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
