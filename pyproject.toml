[project]
name = "so101-nexus-workspace"
version = "0.1.0"
description = "Workspace root for SO101-Nexus simulation environments"
requires-python = ">=3.10"

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv]
conflicts = [
    [
        { package = "so101-nexus-maniskill" },
        { package = "so101-nexus-mujoco" },
    ],
]

[dependency-groups]
dev = ["pytest-cov>=7.0.0", "ruff", "ty"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["F403", "F405"]

[tool.ruff.lint.isort]
known-first-party = ["so101_nexus_core", "so101_nexus_maniskill", "so101_nexus_mujoco"]

[tool.coverage.run]
source = ["."]
omit = [
    "**/__init__.py",
    "**/tests/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
show_missing = true
