[project]
name = "so101-nexus"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
maniskill = ["mani_skill"]

[dependency-groups]
dev = [
    "pytest-cov>=7.0.0",
    "ruff",
    "ty",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["F403", "F405"]

[tool.ruff.lint.isort]
known-first-party = ["so101_nexus"]

[tool.coverage.run]
source = ["."]
omit = [
    "**/__init__.py",
    "tests/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
show_missing = true
