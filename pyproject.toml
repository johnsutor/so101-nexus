[project]
name = "so101-nexus-workspace"
version = "0.3.1"
description = "Workspace root for SO101-Nexus simulation environments"
requires-python = ">=3.12"
dependencies = [
    "tensorboard>=2.0.0",
    "wandb[media]>=0.16.0",
]

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv]
conflicts = [
    [
        { package = "so101-nexus-maniskill" },
        { package = "so101-nexus-mujoco" },
    ],
    [
        { package = "so101-nexus-maniskill" },
        { package = "so101-nexus-workspace", group = "teleop" },
    ],
    [
        { package = "so101-nexus-maniskill" },
        { package = "so101-nexus-mujoco", group = "teleop" },
    ],
]

[dependency-groups]
dev = ["hypothesis>=6.140.0", "pytest-cov>=7.0.0", "ruff", "ty"]
visual = ["litellm", "Pillow", "imageio[ffmpeg]"]
teleop = ["lerobot[feetech]>=0.5.0", "gradio>=5.0.0", "plotly>=6.0.0"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",        # pycodestyle errors
    "F",        # Pyflakes
    "I",        # isort
    "W",        # pycodestyle warnings
    "D",        # pydocstyle
    "ERA",      # flake8-eradicate (commented-out code)
    "PLR",      # Pylint refactor (duplicate code, too-many-args/branches/returns)
    "PLW",      # Pylint warnings (unused vars, unreachable code)
    "PLC",      # Pylint conventions
    "PGH004",   # blanket-noqa
    "C4",       # flake8-comprehensions (simplify comprehensions)
    "C90",      # mccabe complexity
    "SIM",      # flake8-simplify (redundant conditions, if/else)
    "RUF",      # Ruff-specific (mutable defaults, ambiguous chars)
    "UP",       # pyupgrade (modern Python 3.10+ syntax)
    "B",        # flake8-bugbear (mutable defaults, assert, except)
    "PIE",      # flake8-pie (unnecessary pass, dict wrappers)
    "PT",       # flake8-pytest-style (consistent pytest patterns)
    "RET",      # flake8-return (simplify returns)
    "TCH",      # flake8-type-checking (TYPE_CHECKING imports)
]
ignore = [
    "F403",
    "F405",
    "PLR0913",  # too-many-arguments — config classes legitimately need many params
    "PLR2004",  # magic-value-comparison — physics/sim code uses many numeric literals
    "PLC0415",  # import-outside-top-level — conditional/deferred imports are intentional
    "RUF012",   # mutable-class-default — dataclass-style fields are intentional
    "RUF059",   # unused-unpacked-variable (too aggressive for comprehension patterns)
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["D", "PT006"]
".github/**/*.py" = ["D"]
"examples/**/*.py" = ["D"]



[tool.ruff.lint.mccabe]
max-complexity = 12

[tool.ruff.lint.pylint]
max-args = 8
max-branches = 10
max-returns = 6

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.lint.isort]
known-first-party = ["so101_nexus_core", "so101_nexus_maniskill", "so101_nexus_mujoco"]

[tool.ty.analysis]
replace-imports-with-any = ["mujoco", "mujoco.**"]

[tool.ty.src]
exclude = ["**/tests/**"]

[tool.coverage.run]
source = ["."]
omit = [
    "**/__init__.py",
    "**/tests/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
show_missing = true

[tool.pytest.ini_options]
addopts = ["--import-mode=importlib", "-ra"]
testpaths = [
    "packages/so101-nexus-core/tests",
    "packages/so101-nexus-maniskill/tests",
    "packages/so101-nexus-mujoco/tests",
    "tests",
]
markers = [
    "visual: LLM-powered visual verification tests (require ANTHROPIC_API_KEY or VISUAL_TEST_MODEL)",
]