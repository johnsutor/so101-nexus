name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_CACHE_DEPENDENCY_GLOB: uv.lock

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: ${{ env.UV_CACHE_DEPENDENCY_GLOB }}
          cache-suffix: ci-lint
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dev dependencies
        run: uv sync --locked --group dev
      - name: Lint
        run: make lint

  test:
    name: test (${{ matrix.backend }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        backend: [core, mujoco, maniskill]
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: System deps (mujoco)
        if: matrix.backend == 'mujoco'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1 libglx-mesa0 libegl1-mesa-dev libosmesa6-dev

      - name: System deps (maniskill)
        if: matrix.backend == 'maniskill'
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers libvulkan1

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: ${{ env.UV_CACHE_DEPENDENCY_GLOB }}
          cache-suffix: ci-test-${{ matrix.backend }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend
        run: |
          case "${{ matrix.backend }}" in
            core)      uv sync --locked --package so101-nexus-core --group test ;;
            mujoco)    uv sync --locked --package so101-nexus-mujoco --group test ;;
            maniskill) uv sync --frozen --package so101-nexus-maniskill --group test --prerelease=allow ;;
          esac

      - name: Run tests
        run: |
          if [ "${{ matrix.backend }}" = "mujoco" ]; then
            xvfb-run -a make test-mujoco
          else
            make test-${{ matrix.backend }}
          fi

      - name: Upload coverage data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.backend }}
          path: .coverage.*
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  coverage:
    name: coverage
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: ${{ env.UV_CACHE_DEPENDENCY_GLOB }}
          cache-suffix: ci-coverage
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dev dependencies
        run: uv sync --locked --group dev
      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-*
          merge-multiple: true
      - name: Combine and report
        run: |
          uv run coverage combine
          uv run coverage report --fail-under=84

  docs:
    name: docs
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: ${{ env.UV_CACHE_DEPENDENCY_GLOB }}
          cache-suffix: ci-docs
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up pnpm
        uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8
        with:
          version: 9
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - name: Cache Next.js build output
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: docs/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('docs/pnpm-lock.yaml') }}-${{ hashFiles('docs/app/**', 'docs/content/**', 'docs/lib/**', 'docs/*.mjs', 'docs/*.ts', 'docs/*.json') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('docs/pnpm-lock.yaml') }}-
      - name: Install dev dependencies
        run: uv sync --locked --group dev
      - name: Run docs checks
        run: make docs-check
